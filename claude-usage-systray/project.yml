name: ClaudeUsageSystray
options:
  bundleIdPrefix: com.claude
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  ClaudeUsageSystray:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.usage-systray
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        LSUIElement: YES
    entitlements:
      path: Resources/ClaudeUsageSystray.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  ClaudeUsageSystrayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: ClaudeUsageSystray
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.usage-systray-tests
        GENERATE_INFOPLIST_FILE: YES
